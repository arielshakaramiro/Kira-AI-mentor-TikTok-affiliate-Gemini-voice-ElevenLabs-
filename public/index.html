<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kira — AI Mentor TikTok Affiliate</title>

    <!-- Favicon / logo tab (SVG dengan gradient brand Kira) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <meta name="theme-color" content="#792CA2" />

    <!-- Font sesuai desain Kira.jsx -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />

    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { margin: 0; font-family: "DM Sans", sans-serif; }

      /* Layar loading sederhana selagi bundel app.js dimuat & React me-render. */
      #boot {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; flex-direction: column; gap: 14px;
        background: #FAFAFA; color: #792CA2; font-weight: 600; z-index: 9999;
      }
      #boot .ring {
        width: 38px; height: 38px; border-radius: 50%;
        border: 3px solid #E2D9F0; border-top-color: #792CA2;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="ring"></div>
      <div>Memuat Kira…</div>
    </div>
    <div id="root"></div>

    <!-- Bundel hasil build esbuild (npm run build). React + lucide-react + app.jsx
         digabung jadi satu file lokal, jadi tidak ada lagi dependency CDN. -->
    <script type="module" src="app.js"></script>

    <script>
      // Sembunyikan layar loading begitu React selesai me-render.
      const boot = document.getElementById("boot");
      const root = document.getElementById("root");

      const obs = new MutationObserver(() => {
        if (root.childElementCount > 0) {
          if (boot) boot.style.display = "none";
          obs.disconnect();
          clearTimeout(bootTimer);
        }
      });
      obs.observe(root, { childList: true });

      // Tampilkan error sebenarnya alih-alih spinner yang berputar selamanya.
      // Tanpa ini, kegagalan load/eksekusi app.js hanya terlihat
      // sebagai "Memuat Kira…" yang tak kunjung hilang.
      function showBootError(message) {
        if (!boot) return;
        obs.disconnect();
        boot.innerHTML =
          '<div style="max-width:520px;padding:24px;text-align:center;font-weight:500;color:#792CA2">' +
          '<div style="font-weight:700;margin-bottom:8px">Kira gagal dimuat</div>' +
          '<div style="font-size:13px;color:#8a6aa6;white-space:pre-wrap;word-break:break-word">' +
          String(message).replace(/[<>&]/g, function (c) {
            return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c];
          }) +
          "</div></div>";
      }

      window.addEventListener("error", function (e) {
        // Error saat memuat <script> (mis. app.js tidak ditemukan / 404).
        if (e.target && (e.target.tagName === "SCRIPT" || e.target.tagName === "LINK")) {
          showBootError("Gagal memuat resource:\n" + (e.target.src || e.target.href));
          return;
        }
        if (e.error || e.message) showBootError(e.error?.stack || e.message);
      }, true);

      window.addEventListener("unhandledrejection", function (e) {
        showBootError("Promise ditolak:\n" + (e.reason?.stack || e.reason?.message || e.reason));
      });

      // Kalau setelah 12 detik React belum render & belum ada error eksplisit,
      // kemungkinan app.js belum di-build. Jalankan: npm run build
      const bootTimer = setTimeout(function () {
        if (root.childElementCount === 0) {
          showBootError(
            "Aplikasi belum ter-render setelah 12 detik.\n" +
              "Pastikan bundel sudah dibuat dengan: npm run build\n" +
              "Lalu cek tab Console & Network di DevTools."
          );
        }
      }, 12000);
    </script>
  </body>
</html>
